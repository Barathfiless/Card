  </defs>
  <!-- Rounded slate background card -->
  <rect width="32" height="32" rx="9" fill="#0f172a" />
  <!-- Upper loop of 'B' with cyan-blue gradient -->
  <path d="M10 8h7.5a4.5 4.5 0 0 1 4.5 4.5v0a4.5 4.5 0 0 1-4.5 4.5H10V8z" fill="url(#grad-1)" />
